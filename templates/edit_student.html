<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Edit Student</h2>

    <form method="POST">

        <input type="text" name="name" value="{{ student[2] }}" class="form-control mb-2">

        <input type="text" name="contact" value="{{ student[3] }}" class="form-control mb-3">

        <button class="btn btn-warning">Update</button>

    </form>

</div>

</body>
</html>
