<!DOCTYPE html>
<html>
<head>
    <title>Principal Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Principal Dashboard</h2>

    <a href="/add" class="btn btn-success mb-3">+ Add Student</a>

    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Contact</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>

        {% for s in students %}
        <tr>
            <td>{{ s[0] }}</td>
            <td>{{ s[2] }}</td>
            <td>{{ s[3] }}</td>
            <td>
                <img src="/static/uploads/{{ s[4] }}" width="50">
            </td>
            <td>
                <a href="/edit/{{ s[0] }}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{ s[0] }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
